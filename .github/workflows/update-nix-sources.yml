name: Update Nix sources

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.6.6)"
        required: true

jobs:
  update:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      # On a `release` event the default checkout lands on the tag (detached
      # HEAD); create-pull-request needs a branch base, so check out main.
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Normalize tag
        id: tag
        env:
          RAW_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.event.workflow_run.head_branch }}
        run: |
          if [ -z "$RAW_TAG" ]; then
            echo "::error::Could not determine release tag."
            exit 1
          fi
          case "$RAW_TAG" in
            v*) TAG="$RAW_TAG" ;;
            *) TAG="v$RAW_TAG" ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          required=(
            "Kite_${VERSION}_amd64.deb"
            "Kite_${VERSION}_x64.app.tar.gz"
            "Kite_${VERSION}_aarch64.app.tar.gz"
          )

          for attempt in {1..30}; do
            assets="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
            missing=()
            for asset in "${required[@]}"; do
              if ! grep -Fxq "$asset" <<< "$assets"; then
                missing+=("$asset")
              fi
            done

            if [ "${#missing[@]}" -eq 0 ]; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              printf '::error::Release %s is missing required assets: %s\n' "$TAG" "${missing[*]}"
              exit 1
            fi

            printf 'Waiting for release assets (%s missing): %s\n' "${#missing[@]}" "${missing[*]}"
            sleep 20
          done

          for asset in "${required[@]}"; do
            gh release download "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --pattern "$asset" \
              --clobber
          done

      - name: Compute SRI hashes
        id: hashes
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          hash_sri() {
            openssl dgst -sha256 -binary "$1" | base64 | tr -d '\n'
          }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "linux=sha256-$(hash_sri "Kite_${VERSION}_amd64.deb")" >> "$GITHUB_OUTPUT"
          echo "x64-darwin=sha256-$(hash_sri "Kite_${VERSION}_x64.app.tar.gz")" >> "$GITHUB_OUTPUT"
          echo "aarch64-darwin=sha256-$(hash_sri "Kite_${VERSION}_aarch64.app.tar.gz")" >> "$GITHUB_OUTPUT"

      - name: Update nix/sources.json
        run: |
          cat > nix/sources.json <<- EOF
          {
            "version": "${{ steps.hashes.outputs.version }}",
            "hashes": {
              "x86_64-linux": "${{ steps.hashes.outputs.linux }}",
              "x86_64-darwin": "${{ steps.hashes.outputs.x64-darwin }}",
              "aarch64-darwin": "${{ steps.hashes.outputs.aarch64-darwin }}"
            }
          }
          EOF

      - name: Create PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "update nix sources to ${{ steps.hashes.outputs.version }}"
          title: "nix: update sources to ${{ steps.hashes.outputs.version }}"
          body: 'Automated update of `nix/sources.json` for release ${{ steps.tag.outputs.tag }}.'
          base: main
          # Only commit the manifest; the downloaded release assets sit in the
          # work tree and must not be committed.
          add-paths: nix/sources.json
          branch: update-nix-sources/${{ steps.hashes.outputs.version }}
          delete-branch: true
