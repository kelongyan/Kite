name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.8.2)"
        required: true

# Required to create/update GitHub Releases and upload assets.
# Setting at workflow level ensures the token has write access regardless of
# how the workflow is triggered (tag push vs. workflow_dispatch).
permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          key: ${{ matrix.platform }}-${{ matrix.rust-target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release draft state
        id: release-state
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft' > draft-state.txt 2>/dev/null; then
            RELEASE_DRAFT="$(cat draft-state.txt)"
          else
            RELEASE_DRAFT="true"
          fi
          echo "draft=$RELEASE_DRAFT" >> "$GITHUB_OUTPUT"

      - name: Check Apple signing certificate
        if: startsWith(matrix.platform, 'macos')
        id: apple_signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${APPLE_CERTIFICATE:-}" || -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Apple signing certificate secrets are missing; building unsigned macOS assets."
            exit 0
          fi

          cert_file="$(mktemp)"
          if printf '%s' "$APPLE_CERTIFICATE" \
            | openssl base64 -d -A -out "$cert_file" 2>/dev/null \
            && openssl pkcs12 -in "$cert_file" -nokeys -passin "pass:$APPLE_CERTIFICATE_PASSWORD" -noout >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Apple signing certificate could not be decoded as a base64 .p12; building unsigned macOS assets."
          fi

      - name: Write Apple API key to disk
        if: startsWith(matrix.platform, 'macos') && steps.apple_signing.outputs.enabled == 'true'
        shell: bash
        env:
          KEY_CONTENT: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$KEY_CONTENT" > "$HOME/private_keys/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$HOME/private_keys/AuthKey.p8" >> "$GITHUB_ENV"

      - id: tauri-non-macos
        name: Build non-macOS bundles
        if: ${{ !startsWith(matrix.platform, 'macos') }}
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Kite ${{ env.RELEASE_TAG }}"
          releaseBody: "See the assets to download and install."
          releaseDraft: ${{ steps.release-state.outputs.draft }}
          prerelease: false
          args: ${{ matrix.args }}

      - id: tauri-macos-signed
        name: Build signed macOS bundles
        if: startsWith(matrix.platform, 'macos') && steps.apple_signing.outputs.enabled == 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Kite ${{ env.RELEASE_TAG }}"
          releaseBody: "See the assets to download and install."
          releaseDraft: ${{ steps.release-state.outputs.draft }}
          prerelease: false
          args: ${{ matrix.args }}

      - id: tauri-macos-unsigned
        name: Build unsigned macOS bundles
        if: startsWith(matrix.platform, 'macos') && steps.apple_signing.outputs.enabled != 'true'
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "Kite ${{ env.RELEASE_TAG }}"
          releaseBody: "See the assets to download and install."
          releaseDraft: ${{ steps.release-state.outputs.draft }}
          prerelease: false
          args: ${{ matrix.args }}

      # Strip the bundled libwayland-* libs from the AppImage so it loads the
      # host copies at runtime. The Ubuntu 22.04 build host ships libwayland
      # 1.20, but recent Mesa (Fedora 43 / Arch / Bazzite, Mesa 1.22+) needs
      # newer symbols; AppImage puts its bundled libs first on the search path,
      # so the stale copy wins and EGL fails with EGL_BAD_PARAMETER. libgdk-3
      # hard-links these three, so removing them only redirects resolution to
      # the host copy, which every GTK-capable system has. They are on the
      # AppImage excludelist for this exact reason. Updater artifacts are
      # disabled in tauri.conf.json, so this step only replaces the uploaded
      # AppImage and removes any stale AppImage signature asset.
      - name: Fix AppImage wayland libs
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          APPIMAGE=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -n1)
          BASENAME=$(basename "$APPIMAGE")
          echo "Patching: $APPIMAGE"

          WORK=$(mktemp -d)
          cp "$APPIMAGE" "$WORK/"
          pushd "$WORK" >/dev/null
          chmod +x "./$BASENAME"
          "./$BASENAME" --appimage-extract >/dev/null

          # Fail loud if Tauri/linuxdeploy stops bundling these, so a future
          # layout change cannot silently ship an unfixed AppImage.
          for lib in libwayland-client.so.0 libwayland-egl.so.1 libwayland-cursor.so.0; do
            test -e "squashfs-root/usr/lib/$lib" \
              || { echo "expected bundled lib missing: $lib (layout changed?)"; exit 1; }
          done

          rm -f squashfs-root/usr/lib/libwayland-client.so.0 \
                squashfs-root/usr/lib/libwayland-egl.so.1 \
                squashfs-root/usr/lib/libwayland-cursor.so.0 \
                squashfs-root/usr/lib/libwayland-server.so.0

          curl -fsSL -o appimagetool.AppImage \
            https://github.com/AppImage/appimagetool/releases/download/1.9.1/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ARCH=x86_64 ./appimagetool.AppImage --appimage-extract-and-run squashfs-root "$BASENAME"

          # Sanity-check the repacked image before it replaces the original.
          rm -rf squashfs-root
          chmod +x "./$BASENAME"
          "./$BASENAME" --appimage-extract >/dev/null
          for lib in libwayland-client.so.0 libwayland-egl.so.1 libwayland-cursor.so.0; do
            test ! -e "squashfs-root/usr/lib/$lib" \
              || { echo "lib still present after repack: $lib"; exit 1; }
          done
          test -x squashfs-root/usr/bin/kite \
            || { echo "kite binary missing from repacked AppImage"; exit 1; }
          popd >/dev/null

          cp "$WORK/$BASENAME" "$APPIMAGE"

          gh release delete-asset "$RELEASE_TAG" "$BASENAME.sig" --yes --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh release upload "$RELEASE_TAG" "$APPIMAGE" \
            --clobber --repo "$GITHUB_REPOSITORY"
